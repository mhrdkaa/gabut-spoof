<!DOCTYPE html>
<html>

<head>
    <title>Spoof Test</title>
</head>

<body style="background:white; color:black; font-family:sans-serif; text-align:center; padding-top:100px;">

    <div id="start">
        <button id="go" style="padding:10px 20px;" onclick="run()">Jalankan Spoof</button>
    </div>

    <div id="spoofed" style="display:none;">
        <h1>This is not google</h1>
        <br>
        <button onclick="alert('Alert dari konten spoof')">Tombol Alert</button>
    </div>

    <script>
        function run() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('spoofed').style.display = 'block';
            location.href = "https://www.google.com/";
            setTimeout(() => {
                window.stop();
            }, 5);
        }
    </script>

</body>

</html>
